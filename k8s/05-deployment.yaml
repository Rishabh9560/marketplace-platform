apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendor-service
  namespace: marketplace
  labels:
    app: vendor-service
    version: "1.0"
    tier: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: vendor-service
      tier: backend
  template:
    metadata:
      labels:
        app: vendor-service
        tier: backend
        version: "1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/api/v1/actuator/prometheus"
        co.elastic.logs/enabled: "true"
    spec:
      serviceAccountName: vendor-service
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - vendor-service
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: node.kubernetes.io/instance-type
                    operator: In
                    values:
                      - t3.medium
                      - t3.large
      initContainers:
        # Wait for database to be ready
        - name: wait-for-db
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z vendor-db.marketplace.svc.cluster.local 5432; do echo waiting for db; sleep 2; done']
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      
      containers:
        - name: vendor-service
          image: marketplace-vendor-service:1.0.0
          imagePullPolicy: IfNotPresent
          imagePullSecrets:
            - name: registry-credentials
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: debug
              containerPort: 5005
              protocol: TCP
          env:
            # Database Configuration
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: vendor-service-secrets
                  key: DATABASE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: vendor-service-secrets
                  key: DATABASE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vendor-service-secrets
                  key: DATABASE_PASSWORD
            
            # JWT Configuration
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vendor-service-secrets
                  key: JWT_SECRET
            
            # Redis Configuration
            - name: SPRING_REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: vendor-service-secrets
                  key: REDIS_HOST
            - name: SPRING_REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: vendor-service-secrets
                  key: REDIS_PORT
            - name: SPRING_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vendor-service-secrets
                  key: REDIS_PASSWORD
            
            # CORS Configuration
            - name: SECURITY_CORS_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: vendor-service-secrets
                  key: CORS_ALLOWED_ORIGINS
            
            # Spring Profiles
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s,prod"
            
            # Pod Information
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          
          livenessProbe:
            httpGet:
              path: /api/v1/actuator/health/liveness
              port: http
              scheme: HTTP
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /api/v1/actuator/health/readiness
              port: http
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          
          startupProbe:
            httpGet:
              path: /api/v1/actuator/health
              port: http
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          
          volumeMounts:
            - name: config
              mountPath: /etc/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/cache
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      
      volumes:
        - name: config
          configMap:
            name: vendor-service-config
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir:
            sizeLimit: 1Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vendor-service
  namespace: marketplace
  labels:
    app: vendor-service
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vendor-service
  namespace: marketplace
  labels:
    app: vendor-service
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vendor-service
  namespace: marketplace
  labels:
    app: vendor-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vendor-service
subjects:
  - kind: ServiceAccount
    name: vendor-service
    namespace: marketplace
