apiVersion: v1
kind: Namespace
metadata:
  name: marketplace
  labels:
    name: marketplace
    environment: production
  annotations:
    description: "Marketplace microservices namespace"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: marketplace-quota
  namespace: marketplace
spec:
  hard:
    requests.cpu: "100"
    requests.memory: "200Gi"
    limits.cpu: "200"
    limits.memory: "400Gi"
    pods: "500"
    services: "100"
    persistentvolumeclaims: "50"
---
apiVersion: v1
kind: NetworkPolicy
metadata:
  name: marketplace-default-deny
  namespace: marketplace
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
