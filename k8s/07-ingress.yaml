apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vendor-service-ingress
  namespace: marketplace
  labels:
    app: vendor-service
    tier: backend
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://localhost:3000,https://vendor.marketplace.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
spec:
  tls:
    - hosts:
        - api.vendor.marketplace.com
        - vendor-api.marketplace.com
      secretName: vendor-service-tls
  rules:
    # Vendor API Endpoints
    - host: api.vendor.marketplace.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vendor-service
                port:
                  number: 8080
    
    # Alternative domain
    - host: vendor-api.marketplace.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vendor-service
                port:
                  number: 8080
    
    # Localhost for development
    - host: localhost
      http:
        paths:
          - path: /api/v1/vendors
            pathType: Prefix
            backend:
              service:
                name: vendor-service
                port:
                  number: 8080
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vendor-service-cert
  namespace: marketplace
  labels:
    app: vendor-service
spec:
  secretName: vendor-service-tls
  duration: 2160h  # 90 days
  renewBefore: 720h  # 30 days
  commonName: api.vendor.marketplace.com
  dnsNames:
    - api.vendor.marketplace.com
    - vendor-api.marketplace.com
    - "*.vendor.marketplace.com"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app: vendor-service
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@marketplace.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vendor-service-ingress-netpol
  namespace: marketplace
  labels:
    app: vendor-service
spec:
  podSelector:
    matchLabels:
      app: vendor-service
      tier: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from nginx ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    
    # Allow from within same namespace
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  
  egress:
    # Allow to database (vendor-db)
    - to:
        - podSelector:
            matchLabels:
              app: vendor-db
              tier: database
      ports:
        - protocol: TCP
          port: 5432
    
    # Allow to Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
              tier: cache
      ports:
        - protocol: TCP
          port: 6379
    
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    
    # Allow to external APIs (0.0.0.0/0 on port 443)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32  # Block AWS metadata service
      ports:
        - protocol: TCP
          port: 443
