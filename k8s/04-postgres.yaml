apiVersion: v1
kind: Service
metadata:
  name: vendor-db
  namespace: marketplace
  labels:
    app: vendor-db
    tier: database
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: vendor-db
    tier: database
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vendor-db
  namespace: marketplace
  labels:
    app: vendor-db
    tier: database
spec:
  serviceName: vendor-db
  replicas: 1
  selector:
    matchLabels:
      app: vendor-db
      tier: database
  template:
    metadata:
      labels:
        app: vendor-db
        tier: database
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: vendor_service
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: vendor-service-secrets
                  key: DATABASE_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vendor-service-secrets
                  key: DATABASE_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U $POSTGRES_USER
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U $POSTGRES_USER
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: vendor-db-storage
              mountPath: /var/lib/postgresql/data
            - name: postgres-config
              mountPath: /etc/postgresql
        
        # PostgreSQL Exporter for Prometheus monitoring
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9187
              name: metrics
              protocol: TCP
          env:
            - name: DATA_SOURCE_NAME
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@localhost:5432/vendor_service?sslmode=disable"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: vendor-service-secrets
                  key: DATABASE_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vendor-service-secrets
                  key: DATABASE_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 9187
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 9187
            initialDelaySeconds: 5
            periodSeconds: 10
      
      volumes:
        - name: postgres-config
          configMap:
            name: postgres-config
            optional: true
  
  volumeClaimTemplates:
    - metadata:
        name: vendor-db-storage
        labels:
          app: vendor-db
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: marketplace
data:
  postgresql.conf: |
    # Connection Settings
    max_connections = 100
    superuser_reserved_connections = 3
    
    # Memory Settings
    shared_buffers = 256MB
    effective_cache_size = 1GB
    maintenance_work_mem = 64MB
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    default_statistics_target = 100
    random_page_cost = 1.1
    effective_io_concurrency = 200
    work_mem = 4MB
    
    # WAL Settings
    max_wal_size = 4GB
    min_wal_size = 1GB
    wal_level = replica
    max_wal_senders = 10
    max_replication_slots = 10
    
    # Logging
    log_min_duration_statement = 1000
    log_connections = on
    log_disconnections = on
    log_lock_waits = on
    log_statement = 'all'
