---
# Vendor Dashboard Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: vendor-dashboard
  namespace: marketplace
  labels:
    app: vendor-dashboard
    tier: frontend
  annotations:
    description: "ClusterIP service for vendor dashboard frontend"
spec:
  type: ClusterIP
  selector:
    app: vendor-dashboard
    tier: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
# Headless Service for DNS discovery
apiVersion: v1
kind: Service
metadata:
  name: vendor-dashboard-headless
  namespace: marketplace
  labels:
    app: vendor-dashboard
    tier: frontend
spec:
  clusterIP: None
  selector:
    app: vendor-dashboard
    tier: frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP

---
# PodDisruptionBudget for vendor-dashboard
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vendor-dashboard
  namespace: marketplace
  labels:
    app: vendor-dashboard
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: vendor-dashboard
      tier: frontend

---
# NetworkPolicy for vendor-dashboard
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vendor-dashboard
  namespace: marketplace
  labels:
    app: vendor-dashboard
spec:
  podSelector:
    matchLabels:
      app: vendor-dashboard
      tier: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from nginx ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
    # Allow from within marketplace namespace
    - from:
        - namespaceSelector:
            matchLabels:
              name: marketplace
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Allow to vendor-service (backend API)
    - to:
        - podSelector:
            matchLabels:
              app: vendor-service
              tier: backend
      ports:
        - protocol: TCP
          port: 8080
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # Allow external HTTPS for CDN, analytics, etc.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
