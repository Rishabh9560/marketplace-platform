apiVersion: v1
kind: PersistentVolume
metadata:
  name: vendor-db-pv
  labels:
    app: vendor-service
    type: vendor-database
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: fast-ssd
  hostPath:
    path: /mnt/data/vendor-db
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: vendor-backup-pv
  labels:
    app: vendor-service
    type: vendor-backup
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  hostPath:
    path: /mnt/backup/vendor-db
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vendor-db-pvc
  namespace: marketplace
  labels:
    app: vendor-service
    type: vendor-database
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 50Gi
  selector:
    matchLabels:
      type: vendor-database
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vendor-backup-pvc
  namespace: marketplace
  labels:
    app: vendor-service
    type: vendor-backup
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: standard
  resources:
    requests:
      storage: 100Gi
  selector:
    matchLabels:
      type: vendor-backup
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast-ssd
  namespace: marketplace
provisioner: kubernetes.io/no-provisioner
reclaimPolicy: Retain
allowVolumeExpansion: true
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard
  namespace: marketplace
provisioner: kubernetes.io/no-provisioner
reclaimPolicy: Retain
allowVolumeExpansion: true
