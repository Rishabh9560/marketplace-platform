name: Deploy to Staging

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - dev

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}/marketplace-vendor-service
  FRONTEND_IMAGE_NAME: ${{ github.repository }}/marketplace-vendor-dashboard
  KUBE_NAMESPACE: marketplace-staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    
    environment:
      name: staging
      url: https://vendor-staging.marketplace.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
    
    - name: Configure kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config
    
    - name: Verify cluster connectivity
      run: |
        kubectl cluster-info
        kubectl get nodes
    
    - name: Create namespace if not exists
      run: |
        kubectl create namespace $KUBE_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
    
    - name: Apply base manifests
      run: |
        kubectl apply -f k8s/00-namespace.yaml
        kubectl apply -f k8s/01-configmap.yaml
    
    - name: Create image pull secret
      if: secrets.REGISTRY_USERNAME != ''
      run: |
        kubectl create secret docker-registry ghcr-secret \
          --docker-server=${{ env.REGISTRY }} \
          --docker-username=${{ secrets.REGISTRY_USERNAME }} \
          --docker-password=${{ secrets.REGISTRY_PASSWORD }} \
          -n $KUBE_NAMESPACE \
          --dry-run=client -o yaml | kubectl apply -f -
    
    - name: Update image references in manifests
      run: |
        # Update backend image
        sed -i 's|marketplace-vendor-service:1.0.0|${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}|g' k8s/05-deployment.yaml
        
        # Update frontend image
        sed -i 's|marketplace-vendor-dashboard:1.0.0|${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}|g' k8s/10-dashboard-deployment.yaml
    
    - name: Apply storage manifests
      run: |
        kubectl apply -f k8s/03-storage.yaml -n $KUBE_NAMESPACE
    
    - name: Wait for storage to be ready
      run: |
        kubectl wait --for=condition=Bound pvc/vendor-db-pvc -n $KUBE_NAMESPACE --timeout=300s || true
    
    - name: Deploy database
      run: |
        kubectl apply -f k8s/04-postgres.yaml -n $KUBE_NAMESPACE
    
    - name: Wait for database to be ready
      run: |
        kubectl wait --for=condition=ready pod -l app=vendor-db -n $KUBE_NAMESPACE --timeout=300s
    
    - name: Deploy backend service
      run: |
        kubectl apply -f k8s/05-deployment.yaml -n $KUBE_NAMESPACE
    
    - name: Wait for backend to be ready
      run: |
        kubectl wait --for=condition=available deployment/vendor-service -n $KUBE_NAMESPACE --timeout=300s
    
    - name: Deploy frontend service
      run: |
        kubectl apply -f k8s/10-dashboard-deployment.yaml -n $KUBE_NAMESPACE
        kubectl apply -f k8s/11-dashboard-service.yaml -n $KUBE_NAMESPACE
        kubectl apply -f k8s/12-dashboard-config.yaml -n $KUBE_NAMESPACE
    
    - name: Wait for frontend to be ready
      run: |
        kubectl wait --for=condition=available deployment/vendor-dashboard -n $KUBE_NAMESPACE --timeout=300s
    
    - name: Deploy services and networking
      run: |
        kubectl apply -f k8s/06-service.yaml -n $KUBE_NAMESPACE
        kubectl apply -f k8s/13-marketplace-ingress.yaml -n $KUBE_NAMESPACE
    
    - name: Deploy auto-scaling
      run: |
        kubectl apply -f k8s/08-autoscaling.yaml -n $KUBE_NAMESPACE
    
    - name: Deploy monitoring
      run: |
        kubectl apply -f k8s/09-monitoring.yaml -n $KUBE_NAMESPACE || true
    
    - name: Verify deployment
      run: |
        echo "=== Deployment Status ==="
        kubectl get deployments -n $KUBE_NAMESPACE
        kubectl get pods -n $KUBE_NAMESPACE
        kubectl get svc -n $KUBE_NAMESPACE
        
        echo ""
        echo "=== Backend Pod Status ==="
        kubectl describe deployment vendor-service -n $KUBE_NAMESPACE | tail -20
        
        echo ""
        echo "=== Frontend Pod Status ==="
        kubectl describe deployment vendor-dashboard -n $KUBE_NAMESPACE | tail -20
    
    - name: Test API endpoint
      run: |
        # Wait for service to be stable
        sleep 30
        
        # Get load balancer IP or service IP
        SERVICE_IP=$(kubectl get svc -n $KUBE_NAMESPACE vendor-service -o jsonpath='{.status.loadBalancer.ingress[0].ip}' || echo "")
        
        if [ -z "$SERVICE_IP" ]; then
          echo "Service IP not yet assigned or using ClusterIP"
          SERVICE_IP=$(kubectl get svc -n $KUBE_NAMESPACE vendor-service -o jsonpath='{.spec.clusterIP}')
        fi
        
        echo "Service IP: $SERVICE_IP"
        
        # Try health check (may fail due to network policies)
        curl -k -f https://vendor-staging.marketplace.com/api/v1/actuator/health || echo "Health check may require DNS configuration"
    
    - name: Get deployment info
      if: always()
      run: |
        echo "=== Deployment Complete ==="
        echo ""
        echo "Frontend: https://vendor-staging.marketplace.com"
        echo "Backend API: https://api-staging.vendor.marketplace.com"
        echo ""
        echo "Namespace: $KUBE_NAMESPACE"
        kubectl get all -n $KUBE_NAMESPACE
    
    - name: Create deployment annotation
      run: |
        kubectl annotate deployment vendor-service -n $KUBE_NAMESPACE \
          deployment.kubernetes.io/revision="${{ github.run_number }}" \
          github.com/commit="${{ github.sha }}" \
          github.com/actor="${{ github.actor }}" \
          github.com/workflow="${{ github.workflow }}" \
          --overwrite || true
    
    - name: Slack notification
      if: always()
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {
            "text": "Staging Deployment: ${{ job.status }}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Staging Deployment*\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      continue-on-error: true
