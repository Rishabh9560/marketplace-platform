spring:
  application:
    name: auth-service
  
  # Database Configuration
  datasource:
    url: jdbc:mysql://mysql:3306/marketplace_auth?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password: root_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: false
  
  # Server Configuration
  servlet:
    context-path: /
  
  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-very-secure-secret-key-for-jwt-must-be-long-enough-at-least-256-bits}
  access-token-expiration: 3600000  # 1 hour in milliseconds
  refresh-token-expiration: 604800000  # 7 days in milliseconds

# OAuth2 Google Configuration
google:
  client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
  client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}

# Twilio SMS Configuration
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:your-twilio-account-sid}
  auth-token: ${TWILIO_AUTH_TOKEN:your-twilio-auth-token}
  phone-number: ${TWILIO_PHONE_NUMBER:+1234567890}

# Server Port
server:
  port: 8001
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024

# Logging Configuration
logging:
  level:
    root: INFO
    com.marketplace: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
