spring:
  application:
    name: vendor-service

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false
        jdbc:
          fetch_size: 100
          batch_size: 50

logging:
  level:
    root: WARN
    com.logicveda.marketplace: INFO
    org.springframework: WARN
  file:
    name: /var/log/vendor-service/vendor-service.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 10GB

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

app:
  debug: false

# Production specific settings
server:
  compression:
    enabled: true
    min-response-size: 2048
