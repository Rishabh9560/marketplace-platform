spring:
  application:
    name: vendor-service

  datasource:
    url: jdbc:postgresql://localhost:5432/marketplace_vendor_dev
    username: marketplace
    password: marketplace_pass

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true

logging:
  level:
    root: INFO
    com.logicveda.marketplace: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

# Development specific settings
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,configprops
  endpoint:
    health:
      show-details: always

app:
  debug: true
